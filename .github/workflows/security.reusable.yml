# ATRIUM — Security & supply-chain reusable workflow (TEMPLATE)
#
# Second reusable workflow (sibling to docker-tool.reusable.yml). Bundles the
# checks that are *identical* across the four tool repos so they stay DRY:
#   1. version-check  — CITATION.cff == para_config.txt [tool] version (== git tag on tag push)
#   2. image-scan     — Trivy CVE scan of the published GHCR image -> SARIF in the Security tab
#   3. sbom           — Software Bill of Materials for the image (supply-chain transparency)
#
# Host this once in ufal/atrium-project/.github/workflows/ and call it from each
# repo with a ~15-line caller (see security.caller.example.yml).
#
# NOTE: action versions match the Node-24 baseline already used by
# docker-tool.reusable.yml. Verify/pin latest majors (and ideally commit SHAs)
# at adoption time — see comments on the Trivy step.

name: ATRIUM Security Template

on:
  workflow_call:
    inputs:
      image-ref:
        description: "Image to scan/SBOM, e.g. ghcr.io/ufal/atrium-translator:latest. Leave empty to skip image jobs."
        required: false
        type: string
        default: ""
      citation-path:
        required: false
        type: string
        default: "CITATION.cff"
      para-config-path:
        required: false
        type: string
        default: "para_config.txt"   # page-classification passes setup/para_config.txt

jobs:
  # --- 1. Version consistency (cheap, no image needed) -------------------------
  version-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Check CITATION.cff <-> para_config <-> tag
        env:
          CITATION_PATH: ${{ inputs.citation-path }}
          PARA_PATH: ${{ inputs.para-config-path }}
          # Only set on a v* tag push; empty otherwise:
          TAG_REF: ${{ startsWith(github.ref, 'refs/tags/v') && github.ref_name || '' }}
        run: |
          python - <<'PY'
          import configparser, os, re, sys

          def citation_version(path):
              # top-level "version:" only (column 0, ignore nested keys)
              with open(path, encoding="utf-8") as fh:
                  for line in fh:
                      m = re.match(r'version:\s*["\']?v?([^"\'\s]+)', line)
                      if m:
                          return m.group(1)
              return None

          def paraconfig_version(path):
              cp = configparser.ConfigParser()
              cp.read(path, encoding="utf-8")
              v = cp.get("tool", "version", fallback=None)
              return v[1:] if v and v.lower().startswith("v") else v

          cit = citation_version(os.environ["CITATION_PATH"])
          para = paraconfig_version(os.environ["PARA_PATH"])
          tag = os.environ.get("TAG_REF", "")
          tag = tag[1:] if tag.lower().startswith("v") else tag
          print(f"CITATION.cff={cit!r}  para_config={para!r}  tag={tag!r}")

          errors = []
          if not cit:  errors.append(f"could not parse version from {os.environ['CITATION_PATH']}")
          if not para: errors.append(f"could not parse [tool] version from {os.environ['PARA_PATH']}")
          if cit and para and cit != para:
              errors.append(f"version mismatch: CITATION.cff={cit} != para_config={para}")
          if tag and cit and tag != cit:
              errors.append(f"tag v{tag} != CITATION.cff {cit}")

          for e in errors:
              print(f"::error::{e}")
          sys.exit(1 if errors else 0)
          PY

  # --- 2. Container image vulnerability scan -----------------------------------
  image-scan:
    # Scan only when an image actually exists (post-publish on a tag/release, or on demand).
    if: inputs.image-ref != '' && (startsWith(github.ref, 'refs/tags/v') || github.event_name == 'release' || github.event_name == 'schedule' || github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
      security-events: write   # required to upload SARIF to the Security tab
    steps:
      - uses: actions/checkout@v5

      - name: Trivy scan (image -> SARIF)
        # SECURITY: aquasecurity/trivy-action tags <= 0.34.2 were compromised
        # (Mar 2026 supply-chain incident). Use >= 0.35.0 and pin to a commit SHA
        # in production. Verify latest at https://github.com/aquasecurity/trivy-action/releases
        uses: aquasecurity/trivy-action@0.36.0
        with:
          image-ref: ${{ inputs.image-ref }}
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: "0"   # report-only; set to "1" to FAIL the build on CRITICAL/HIGH

      - name: Upload SARIF to code scanning
        uses: github/codeql-action/upload-sarif@v4   # Node 24; v3 deprecates Dec 2026
        with:
          sarif_file: trivy-results.sarif
          category: trivy-image

  # --- 3. SBOM (supply-chain transparency; ties into the paradata provenance theme) ---
  sbom:
    if: inputs.image-ref != '' && (startsWith(github.ref, 'refs/tags/v') || github.event_name == 'release')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    steps:
      - name: Generate SBOM (SPDX JSON)
        uses: anchore/sbom-action@v0
        with:
          image: ${{ inputs.image-ref }}
          format: spdx-json
          output-file: sbom.spdx.json
      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: sbom.spdx.json
      # Alternative (no extra job): set `provenance: true` and `sbom: true` on the
      # docker/build-push-action@v7 step in docker-tool.reusable.yml, or add a
      # signed attestation with actions/attest-build-provenance.