# ATRIUM — caller for the security reusable workflow (TEMPLATE)
#
# Drop into a tool repo as .github/workflows/security.yml. Mirrors the thin-caller
# pattern of docker.yml. Pin @main to a tag/SHA in production.

name: Security & Supply-chain

on:
  pull_request:
    branches: [test, master]
  push:
    branches: [test, master]
    tags: ['v*']
  release:
    types: [published]
  schedule:
    - cron: "0 6 * * 1"   # weekly re-scan of the published image (new CVEs land continuously)
  workflow_dispatch:

jobs:
  security:
    permissions:
      contents: read
      packages: read
      security-events: write
    uses: ufal/atrium-project/.github/workflows/security.reusable.yml@main
    secrets: inherit
    with:
      # PARAM: the published image to scan/SBOM (omit to run version-check only)
      image-ref: ghcr.io/ufal/atrium-translator:latest
      # PARAM (page-classification only): para-config-path: setup/para_config.txt