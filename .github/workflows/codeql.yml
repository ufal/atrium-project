# ATRIUM — CodeQL static analysis (TEMPLATE)
#
# GitHub-native security/quality scanning for Python. Free for public repos;
# results land in the repo's Security > Code scanning tab. Especially relevant
# now that all four tools ship a FastAPI service/ layer (request-handling surface),
# and nlp-enrich spawns subprocesses (command-injection surface).
#
# Drop into a tool repo as .github/workflows/codeql.yml. No PARAMs needed for
# pure-Python repos (build-mode: none).

name: CodeQL

on:
  push:
    branches: [test, master]
  pull_request:
    branches: [test, master]
  schedule:
    - cron: "30 5 * * 1"   # weekly, catches advisories published since the last push

jobs:
  analyze:
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read
    strategy:
      matrix:
        language: ["python"]
    steps:
      - uses: actions/checkout@v5

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4   # Node 24; v3 deprecates Dec 2026
        with:
          languages: ${{ matrix.language }}
          build-mode: none                   # Python is interpreted — no build step

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:${{ matrix.language }}"