# ATRIUM — automated GitHub Release (TEMPLATE)
#
# Generalized from atrium-page-classification's release.yml so translator /
# nlp-enrich / alto-postprocess can adopt the same pattern: on a v* tag, create a
# GitHub Release with auto-generated notes and (optionally) attach a packaged
# artifact. The Docker image is still published separately by docker.yml.
#
# Drop in as .github/workflows/release.yml.

name: Automated Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write   # required to create the Release

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      # OPTIONAL artifact packaging — page-classification ships a standalone
      # service zip; delete this step for repos that only need release notes.
      - name: Package service artifact (optional, PARAM)
        run: |
          mkdir -p atrium-service
          cp -r service/ atrium-service/ 2>/dev/null || true
          cp README.md atrium-service/ 2>/dev/null || true
          zip -r service_bundle.zip atrium-service/ -x "*/__pycache__/*" "*/.git/*"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            service_bundle.zip