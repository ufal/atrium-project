# ATRIUM — Secret scanning with gitleaks (TEMPLATE)
#
# Belt-and-suspenders secret detection. PRIMARY recommendation is GitHub's native
# secret scanning + push protection (Settings > Code security; free for public
# repos, zero workflow). This workflow adds a history/working-tree sweep.
#
# Most relevant for page-classification (a plaintext HF token previously lived in
# setup/config.txt before being externalized to the HF_TOKEN env var).
#
# ORG NOTE: gitleaks-action requires a free GITLEAKS_LICENSE secret for repos
# owned by an organisation (ufal). Register at https://gitleaks.io and add it as
# an org/repo secret. If you'd rather avoid the license, run the MIT-licensed
# gitleaks CLI directly in a `run:` step instead of this action.

name: Secret Scan

on:
  push:
    branches: [test, master]
  pull_request:
    branches: [test, master]
  schedule:
    - cron: "0 4 * * 1"   # weekly full-history sweep
  workflow_dispatch:

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0   # full history so the scan covers past commits
      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v3   # Node 24; v2 stops working Sep 2026
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}   # required for org-owned repos