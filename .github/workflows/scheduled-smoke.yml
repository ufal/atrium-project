# ATRIUM — Scheduled "slow lane" smoke tests (TEMPLATE)
#
# PR CI runs `pytest -m "not slow"` (hermetic, no network/models). The `slow`
# tests — the ones that actually call LINDAT (UDPipe / NameTag / Translation) and
# download HuggingFace models/revisions — never run there, so upstream breakage
# (an API change, a moved/renamed HF model, a pinned `-rev` that vanished) is
# invisible until a user hits it. This nightly/weekly job closes that gap.
#
# Uses the SAME PARAM knobs as docker-tool.reusable.yml so it matches the repo's
# real environment. Drop in as .github/workflows/scheduled-smoke.yml.

name: Scheduled Smoke Tests

on:
  schedule:
    - cron: "0 3 * * *"    # daily 03:00 UTC — tighten/loosen per repo
  workflow_dispatch:

# PARAM block — copy the values from the repo's docker.yml caller -------------
env:
  APT_PACKAGES: ""                       # PARAM e.g. "build-essential g++ libgl1 libglib2.0-0 poppler-utils"
  PRE_INSTALL_TORCH: ""                  # PARAM e.g. "torch==2.7.1 torchvision==0.22.1"
  REQUIREMENTS: "requirements.txt requirements-test.txt"  # PARAM matches caller `requirements`

jobs:
  slow-tests:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write          # only used by the "open issue on failure" step below
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install APT packages
        if: env.APT_PACKAGES != ''
        run: sudo apt-get update && sudo apt-get install -y ${{ env.APT_PACKAGES }}

      - name: Pre-install PyTorch (CPU)
        if: env.PRE_INSTALL_TORCH != ''
        run: pip install ${{ env.PRE_INSTALL_TORCH }} --index-url https://download.pytorch.org/whl/cpu

      - name: Install dependencies
        run: |
          for req in ${{ env.REQUIREMENTS }}; do
            if [ -f "$req" ]; then pip install -r "$req"; fi
          done
          pip install pytest pytest-cov

      - name: Run slow tests (network + models)
        env:
          PYTHONPATH: .
          HF_TOKEN: ${{ secrets.HF_TOKEN }}   # only needed by repos pulling gated models
        run: python -m pytest -m slow -v --tb=short

      # Optional: surface a failed nightly run as a tracked issue (instead of a silent red run).
      - name: Open issue on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const title = `Scheduled smoke tests failed (${new Date().toISOString().slice(0,10)})`;
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body: `The scheduled \`slow\` test run failed: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}\n\nLikely an upstream change (LINDAT API or a HuggingFace model/revision).`,
              labels: ["ci", "upstream"],
            });