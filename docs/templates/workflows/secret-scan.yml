# atrium-project — generic secret scanning template
# Drops into: .github/workflows/secret-scan.yml
# Note: Requires institutional policy approval before activation on repositories
# with known historical tokens (e.g., atrium-page-classification).

name: Secret Scanning

on:
  push:
  pull_request:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  gitleaks:
    name: Gitleaks History Sweep
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history is required for a complete sweep

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}