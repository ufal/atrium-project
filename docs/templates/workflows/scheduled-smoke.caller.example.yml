# atrium-project — generic scheduled "slow lane" smoke tests
# Drops into: .github/workflows/scheduled-smoke.yml
#
# PR CI runs `pytest -m "not slow"`. This nightly job catches upstream breakage
# (moved/renamed HF models, vanishing external APIs, reachability issues)
# and audits the supply chain.

name: Scheduled Smoke Tests

on:
  schedule:
    - cron: "0 3 * * *"    # daily 03:00 UTC
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  # Template vars to be localized per repository:
  APT_PACKAGES: "build-essential g++"
  PRE_INSTALL_TORCH: "torch"
  REQUIREMENTS: "requirements.txt service/requirements.txt requirements-test.txt"

jobs:
  slow-tests:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install APT packages
        if: env.APT_PACKAGES != ''
        run: sudo apt-get update && sudo apt-get install -y ${{ env.APT_PACKAGES }}

      - name: Pre-install PyTorch (CPU)
        if: env.PRE_INSTALL_TORCH != ''
        run: pip install ${{ env.PRE_INSTALL_TORCH }} --index-url https://download.pytorch.org/whl/cpu

      - name: Install dependencies
        run: |
          for req in ${{ env.REQUIREMENTS }}; do
            if [ -f "$req" ]; then pip install -r "$req"; fi
          done
          pip install pytest pytest-cov

      - name: Supply Chain Audit
        run: pip install pip-audit && pip-audit || true

      - name: Run slow tests (network + models)
        env:
          PYTHONPATH: .
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: python -m pytest -m slow -v --tb=short

      - name: Open issue on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const title = `Scheduled smoke tests failed (${new Date().toISOString().slice(0,10)})`;
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body: `The scheduled \`slow\` test run failed: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}\n\nLikely an upstream change (HuggingFace model/revision, external dependency, or network unreachable).`,
              labels: ["ci", "upstream"],
            });