# atrium-project — generic secret scanning template
# Drops into: .github/workflows/secret-scan.yml
# Note: Requires institutional policy approval before activation on repositories
# with known historical tokens (e.g., atrium-page-classification).
#
# gitleaks-action v3 REQUIRES a GITLEAKS_LICENSE org secret for org-owned
# repos (ufal/*) — free for education/OSS, obtained at gitleaks.io. Without
# it the action exits with a licensing error. v2 is EOL September 2026.

name: Secret Scanning

on:
  push:
  pull_request:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  gitleaks:
    name: Gitleaks History Sweep
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          fetch-depth: 0  # Full history is required for a complete sweep

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}