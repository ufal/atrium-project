# ATRIUM — example .pre-commit-config.yaml (TEMPLATE)
#
# Copy to the repo root as .pre-commit-config.yaml. Uses the same Ruff rules as
# the shared docs/templates/ruff.toml so local hooks and CI agree. The shellcheck
# hook is only needed for shell-heavy repos (nlp-enrich; alto's setup script).
#
# Install once per clone:  pip install pre-commit && pre-commit install
# Verify latest hook revs:  pre-commit autoupdate

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0          # PARAM: pre-commit autoupdate to pin latest
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
        args: ["--maxkb=1024"]   # keep model/data blobs out of git

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.9.0          # PARAM: pre-commit autoupdate
    hooks:
      - id: ruff          # lint (reads ./ruff.toml)
      - id: ruff-format   # optional formatter; drop if you don't want auto-format

  # Shell repos only (nlp-enrich api_*.sh / api_util/*.sh; alto setup_api_server.sh):
  - repo: https://github.com/koalaman/shellcheck-precommit
    rev: v0.10.0         # PARAM: pre-commit autoupdate
    hooks:
      - id: shellcheck
        args: ["-e", "SC1091"]   # don't follow sourced files that aren't present